name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.0.1)'
        required: true
        default: '2.0.0'

env:
  APP_NAME: TTCookieRobot
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set version from input or tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Update version in code
        shell: python
        run: |
          import re
          from datetime import datetime
          
          version = "${{ steps.version.outputs.VERSION }}"
          today = datetime.now().strftime("%Y-%m-%d")
          
          # Update version.py
          with open("version.py", "w", encoding="utf-8") as f:
              f.write(f'''"""
          Version information for TT Cookie Robot.
          This file is automatically updated by GitHub Actions during build.
          """
          
          VERSION = "{version}"
          BUILD_DATE = "{today}"
          
          def get_version() -> str:
              """Return the current version string."""
              return VERSION
          
          def get_version_tuple() -> tuple:
              """Return version as tuple (major, minor, patch)."""
              parts = VERSION.split(".")
              return tuple(int(p) for p in parts[:3])
          ''')
          
          # Update version_info.txt for Windows EXE metadata
          parts = version.split(".")
          while len(parts) < 4:
              parts.append("0")
          ver_tuple = ", ".join(parts[:4])
          
          content = f'''# UTF-8
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=({ver_tuple}),
              prodvers=({ver_tuple}),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo(
                [
                  StringTable(
                    u'040904B0',
                    [
                      StringStruct(u'CompanyName', u'TT Cookie Robot'),
                      StringStruct(u'FileDescription', u'TT Cookie Robot - Octo Browser Automation'),
                      StringStruct(u'FileVersion', u'{version}'),
                      StringStruct(u'InternalName', u'TTCookieRobot'),
                      StringStruct(u'LegalCopyright', u'2024-2026'),
                      StringStruct(u'OriginalFilename', u'TTCookieRobot.exe'),
                      StringStruct(u'ProductName', u'TT Cookie Robot'),
                      StringStruct(u'ProductVersion', u'{version}'),
                    ]
                  )
                ]
              ),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          '''
          
          with open("version_info.txt", "w", encoding="utf-8") as f:
              f.write(content)
          
          print(f"Updated version to {version}")
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Install Playwright browsers
        run: playwright install chromium
      
      - name: Build EXE with PyInstaller
        run: pyinstaller build_windows.spec --clean --noconfirm
      
      - name: Create portable ZIP
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path "dist\${{ env.APP_NAME }}\*" -DestinationPath "${{ env.APP_NAME }}_${version}_Windows_Portable.zip"
      
      - name: Install Inno Setup
        run: choco install innosetup -y
      
      - name: Build Installer
        run: iscc installer.iss
        continue-on-error: true
      
      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Portable
          path: ${{ env.APP_NAME }}_*_Windows_Portable.zip
      
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: installer_output/*.exe
        continue-on-error: true
      
      - name: Upload Build Folder (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build-Debug
          path: dist/${{ env.APP_NAME }}/
        if: failure()

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set version from input or tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Update version in code
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TODAY=$(date +%Y-%m-%d)
          
          cat > version.py << EOF
          """
          Version information for TT Cookie Robot.
          This file is automatically updated by GitHub Actions during build.
          """
          
          VERSION = "$VERSION"
          BUILD_DATE = "$TODAY"
          
          def get_version() -> str:
              """Return the current version string."""
              return VERSION
          
          def get_version_tuple() -> tuple:
              """Return version as tuple (major, minor, patch)."""
              parts = VERSION.split(".")
              return tuple(int(p) for p in parts[:3])
          EOF
          
          echo "Updated version.py to $VERSION"
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Install Playwright browsers
        run: playwright install chromium
      
      - name: Install create-dmg
        run: brew install create-dmg
      
      - name: Create ICNS icon
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o assets/icon.icns
        continue-on-error: true
      
      - name: Build APP
        run: pyinstaller build_macos.spec --clean --noconfirm
      
      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          create-dmg \
            --volname "TT Cookie Robot" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "TT Cookie Robot.app" 150 185 \
            --hide-extension "TT Cookie Robot.app" \
            --app-drop-link 450 185 \
            "${{ env.APP_NAME }}_${VERSION}_macOS.dmg" \
            "dist/TT Cookie Robot.app" || true
      
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: "*.dmg"
        continue-on-error: true
      
      - name: Upload macOS APP
        uses: actions/upload-artifact@v4
        with:
          name: macOS-APP
          path: "dist/TT Cookie Robot.app"

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: find artifacts -type f
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: |
            artifacts/Windows-Portable/*.zip
            artifacts/Windows-Installer/*.exe
            artifacts/macOS-DMG/*.dmg
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
